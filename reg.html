    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #ffffff;
            color: #1a202c;
            display: flex;
            justify-content: center;
        }


        #alerter {
            background-color: #485367;
            position: fixed;
            bottom: 30px;
            left: 50%; 
            transform: translateX(-50%);
            padding: 10px;
            border-radius: 10px;
            display: flex;
            gap: 10px;
            min-width: 250px;
            z-index: 99999;

            p {
                color: #fff;
                font-size: 10px;
                letter-spacing: 0.5px;
                line-height: 1.3;
            }
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            width: 100%;
            text-align: center;
        }

        .number-input {
            display: flex;
            gap: 15px;
            margin: 20px 0;

            svg {
                scale: .7;
                rect {
                    transition: fill .5s;
                }
            }

            svg.inputed{
                scale: .75;
                rect{
                fill: #195CBD !important;
            }
                
            }
        }

        .numbers {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            column-gap: 60px !important;
            gap: 40px;
            padding: 0 20px;
        }

        @keyframes done {
            50% {
                transform: translateY(-8px);
            }
        }

        .number {
             padding: 10px 5px;
             border-radius: 50%;
             font-size: 24px;
             color: #195CBD;
             aspect-ratio: 1/1;
             align-self: center;
             text-align: center;
             transition: background-color .25s ease-out;
             user-select: none;
             
        }

        .number:active {
            background-color: #ddf8ff81;
            cursor: pointer;
        }
    </style>
</head>

    <script>
        let rightPassword = "0132";
        let clicks = 0;
        let arr = [];
        document.querySelectorAll('.number').forEach(num => {

            num.addEventListener('click', () => {
                clicks++;
                navigator.vibrate(50);
                if (num.textContent === "Выйти") {
                    window.close();
                    return;
                }
                let inputed = document.querySelectorAll('.number-input svg rect');
                for (let i = 0; i < inputed.length; i++) {
                    if (inputed[i].getAttribute('fill') === "#98A4BA") {
                        inputed[i].setAttribute('fill', '#195CBD');
                        inputed[i].parentElement.classList.add('inputed');
                        arr.push(num.textContent);
                        break;
                    }
                }
                if (clicks === 4) {
                    console.log(arr);
                    if (arr.join('') === rightPassword) {
                        
                        inputed.forEach((btn, counter) => {
                            btn.parentElement.style.animation = "done 1.5s ease-in-out infinite";
                            btn.parentElement.style.animationDelay = counter*100 + "ms";
                        })
                        setTimeout(() => {window.location.href = "index.html"; clicks = 0; arr = []; inputed.forEach(rect => rect.setAttribute('fill', '#98A4BA'));
                        document.querySelectorAll('.number-input svg').forEach(svg => svg.classList.remove('inputed'));}, 1000);
                    } else {
                        //alert("Пароль неверный!");
                        arr = [];
                        navigator.vibrate([100, 50, 100])
                        inputed.forEach(rect => rect.setAttribute('fill', '#98A4BA'));
                        document.querySelectorAll('.number-input svg').forEach(svg => svg.classList.remove('inputed'));
                    }
                    console.log(arr.join(''));
                    clicks = 0;
                }
            });
        });

        document.getElementById("alerter").style.display = "none";
        setTimeout(() => {
            document.getElementById("alerter").style.display = "flex";
        }, 1000 * Math.random());
        document.getElementById("alerter").addEventListener("click", () => {
            document.getElementById("alerter").style.display = "none";
        });

        setTimeout(() => {
            if( document.getElementById('alerter').style.display !== "none"){
             document.getElementById('alerter').style.display = 'none';
            }
        }, 7000);
    </script>
